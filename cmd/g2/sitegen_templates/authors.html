<h2>Authors</h2>
<ul>
    {{range .Authors}}
    <li>
        {{.Name}}
        {{if .Email}}
        &lt;<a href="{{if $.Repo.AuthorsURL}}{{$.Repo.AuthorsURL}}#L{{.Line}}{{else}}https://github.com/gentoo-mirror/gentoo/blob/stable/metadata/AUTHORS#L{{.Line}}{{end}}">Email</a>&gt;
        {{end}}
    </li>
    {{end}}
</ul>
