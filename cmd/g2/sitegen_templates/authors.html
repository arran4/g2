<h2>Authors</h2>
<ul>
    {{range .Authors}}
    <li>
        {{.Name}}
        {{if .Email}}
        &lt;{{if and $.Repo (not (eq $.Repo.AuthorsURL ""))}}<a href="{{$.Repo.AuthorsURL}}#L{{.Line}}">Email</a>{{else}}<a href="https://github.com/gentoo-mirror/gentoo/blob/stable/metadata/AUTHORS#L{{.Line}}">Email</a>{{end}}&gt;
        {{end}}
    </li>
    {{end}}
</ul>
