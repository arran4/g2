
<h2>License: {{.License.Name}}</h2>
{{if .License.Text}}
<details>
    <summary>License Text</summary>
    <pre>{{.License.Text}}</pre>
</details>
{{end}}
<h3>Packages with this license</h3>
<ul>
    {{range .License.Packages}}
    <li>
        {{if eq (len .ReposList) 1}}
            {{$repo := index .ReposList 0}}
            <a href="{{$.BaseURL}}repos/{{$repo.RepoName}}/categories/{{.Category}}/packages/{{.Name}}/">{{.Category}}/{{.Name}}</a>
        {{else}}
            <a href="{{$.BaseURL}}packages/{{.Category}}/{{.Name}}/">{{.Category}}/{{.Name}}</a>
        {{end}}
    </li>
    {{end}}
</ul>
