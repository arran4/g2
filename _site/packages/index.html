    <script>
        function updateTimeAgo() {
            var dateSpan = document.getElementById("generation-date");
            if (!dateSpan) return;
            var timeAgoSpan = document.getElementById("time-ago");
            if (!timeAgoSpan) return;
            var genDate = new Date(dateSpan.getAttribute("data-time"));
            if (isNaN(genDate)) return;
            var now = new Date();
            var diffMs = now - genDate;
            var diffSecs = Math.floor(diffMs / 1000);
            if (diffSecs < 60) {
                timeAgoSpan.innerText = "(just now)";
            } else if (diffSecs < 3600) {
                var mins = Math.floor(diffSecs / 60);
                timeAgoSpan.innerText = "(" + mins + " minute" + (mins !== 1 ? "s" : "") + " ago)";
            } else if (diffSecs < 86400) {
                var hours = Math.floor(diffSecs / 3600);
                timeAgoSpan.innerText = "(" + hours + " hour" + (hours !== 1 ? "s" : "") + " ago)";
            } else {
                var days = Math.floor(diffSecs / 86400);
                timeAgoSpan.innerText = "(" + days + " day" + (days !== 1 ? "s" : "") + " ago)";
            }
        }
        updateTimeAgo();
        setInterval(updateTimeAgo, 60000);
    </script>
